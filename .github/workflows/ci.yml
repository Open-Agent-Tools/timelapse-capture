name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Preflight (npm run ci)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TIMELAPSE_HAS_REAL_FFMPEG_SUITE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install ffmpeg and ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run preflight (check + format:check + typecheck + test)
        run: npm run ci
